services:
  database:
    image: postgres:alpine
    container_name: tarmac_fox_db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: test1234
      POSTGRES_DB: tarmac_fox
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:alpine
    container_name: tarmac_fox_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
volumes:
  db_data:
    driver: local